# ==========================================
# CONFIGURATION BASE DE DONNEES MySQL
# ==========================================

# Adresse du serveur (localhost = votre machine)
db.host=localhost

# Port MySQL par defaut
db.port=3306

# Nom de la base de donnees
db.name=conference_reservation

# Nom d'utilisateur MySQL
db.user=root

# Votre mot de passe MySQL (modifiez cette valeur !)
db.password=VotreMotDePasseMySQL

# Fuseau horaire
db.timezone=UTC

# ==========================================
# CONFIGURATION EMAIL (SMTP Gmail)
# ==========================================

mail.host=smtp.gmail.com
mail.port=587
mail.username=votre.email@gmail.com
mail.password=votre_mot_de_passe_application
mail.from=noreply@conference.com

# ==========================================
# PARAMETRES APPLICATION
# ==========================================

# Rappel 30 minutes avant la reservation
app.notification.reminder.minutes=30